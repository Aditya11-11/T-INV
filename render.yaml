# Render Blueprint for TreadFlow React Static Site
services:
  - type: web
    name: treadflow-tire-analytics
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Redirect all requests to index.html for React Router compatibility (if added later)
      - type: rewrite
        source: /*
        destination: /index.html
